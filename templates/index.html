<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flask Task Manager</title>
  <style>
    body { font-family: system-ui; background: #1a1a1a; color: #eee; padding: 2rem; }
    h1 { color: #47A1B5; }
    .task { padding: 0.5rem 0; border-bottom: 1px solid #333; }
  </style>
</head>
<body>
  <h1>🧪 Flask Task Manager</h1>
  {% for task in tasks %}
    <div class="task">
      {{ "✅" if task.done else "⬜" }} {{ task.title }}
    </div>
  {% endfor %}
</body>
</html>
